<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaNav AI - 스마트 항해 플랫폼</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #0b132b; color: #f4f5f6; }</style>
</head>
<body class="min-h-screen font-sans antialiased">

    <nav class="bg-[#1c2541] border-b border-[#3a506b] px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-anchor text-cyan-400 text-2xl"></i>
            <span class="text-xl font-bold tracking-wider text-white">SeaNav <span class="text-cyan-400">AI</span></span>
        </div>
        <button id="btn-logout" class="hidden bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">로그아웃</button>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="space-y-6 lg:col-span-1">
            <div class="bg-[#1c2541] rounded-xl p-6 shadow-xl border border-[#3a506b]">
                <h2 class="text-lg font-semibold mb-4 text-cyan-300 flex items-center"><i class="fa-solid fa-user-shield mr-2"></i> 선원 인증 (Auth)</h2>
                <div id="login-form-container" class="space-y-4">
                    <input type="email" id="auth-email" class="w-full bg-[#0b132b] border border-[#3a506b] rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-cyan-400" placeholder="이메일">
                    <input type="password" id="auth-password" class="w-full bg-[#0b132b] border border-[#3a506b] rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-cyan-400" placeholder="비밀번호">
                    <div class="flex space-x-2">
                        <button id="btn-login" class="flex-1 bg-cyan-600 text-white py-2 rounded-lg text-sm transition">로그인</button>
                        <button id="btn-signup" class="flex-1 border border-cyan-500/30 text-cyan-400 py-2 rounded-lg text-sm transition">회원가입</button>
                    </div>
                </div>
                <div id="logged-in-container" class="hidden text-center py-4">
                    <p class="text-sm font-medium text-white mb-1">항해사님 환영합니다!</p>
                    <p id="current-user-email" class="text-xs text-gray-400 break-all"></p>
                </div>
            </div>

            <div class="bg-[#1c2541] rounded-xl p-6 shadow-xl border border-[#3a506b]">
                <h2 class="text-lg font-semibold mb-4 text-cyan-300 flex items-center"><i class="fa-solid fa-book-atlas mr-2"></i> 선박 항해 일지 (Firestore)</h2>
                <div class="space-y-3 mb-6">
                    <input type="text" id="log-vessel" class="w-full bg-[#0b132b] border border-[#3a506b] rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-cyan-400" placeholder="선박명">
                    <input type="text" id="log-route" class="w-full bg-[#0b132b] border border-[#3a506b] rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-cyan-400" placeholder="운항 경로">
                    <textarea id="log-note" rows="2" class="w-full bg-[#0b132b] border border-[#3a506b] rounded-lg px-3 py-2 text-white text-sm resize-none focus:outline-none focus:border-cyan-400" placeholder="선박 점검 및 특이사항 기록"></textarea>
                    <button id="btn-save-log" class="w-full bg-emerald-600 text-white py-2 rounded-lg text-sm font-medium transition">클라우드 일지 저장</button>
                </div>
                <div class="border-t border-[#3a506b] pt-4">
                    <div id="log-list" class="space-y-3 max-h-64 overflow-y-auto text-xs text-gray-500 text-center">로그인 후 조회 가능합니다.</div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="bg-[#1c2541] rounded-xl p-6 shadow-xl border border-[#3a506b]">
                <h1 class="text-2xl font-extrabold text-white mb-1">OpenAI 스마트 오디오 브리핑 시스템</h1>
                <p class="text-gray-400 text-sm">구글 앱스크립트 게이트웨이를 경유해 GPT-4o-mini 답변을 구하고 OpenAI 정품 TTS 음성을 가져옵니다.</p>
            </div>

            <div class="bg-[#1c2541] rounded-xl shadow-xl border border-[#3a506b] flex flex-col h-[500px]">
                <div class="px-6 py-4 border-b border-[#3a506b] flex justify-between items-center bg-[#151c33] rounded-t-xl">
                    <span class="text-sm font-semibold text-gray-300">보안 게이트웨이 활성화 상태</span>
                    <button id="btn-stop-audio" class="text-xs text-red-400 border border-red-500/20 px-2 py-1 rounded">음성 재생 중지</button>
                </div>
                <div id="chat-screen" class="flex-1 p-6 overflow-y-auto space-y-4 bg-[#111936]"></div>
                <div class="p-4 border-t border-[#3a506b] bg-[#151c33] rounded-b-xl flex space-x-2">
                    <input type="text" id="ai-input" class="flex-1 bg-[#0b132b] border border-[#3a506b] rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-cyan-400" placeholder="선박 지식, 해사 지식에 대해 물어보세요...">
                    <button id="btn-send-ai" class="bg-cyan-600 text-white px-5 py-3 rounded-xl font-medium transition">전송</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // -------------------------------------------------------------------------
        // [수정 완료] 제공해주신 파이어베이스 설정을 정상 등록했습니다.
        // -------------------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyBLnhtOe0kYSacOhRKoqSbrKknfPFBHg4g",
            authDomain: "letsgokorea-43820.firebaseapp.com",
            databaseURL: "https://letsgokorea-43820-default-rtdb.firebaseio.com",
            projectId: "letsgokorea-43820",
            storageBucket: "letsgokorea-43820.firebasestorage.app",
            messagingSenderId: "580360073929",
            appId: "1:580360073929:web:9778764f05a49428771318",
            measurementId: "G-9FDDGEVLQ7"
        };

        // -------------------------------------------------------------------------
        // [⚠️ 필수 설정] 본인의 구글 앱스크립트 웹앱 배포 URL 주소를 아래에 붙여넣으세요!
        // 주소 끝이 반드시 /exec 로 끝나야 정상 작동합니다.
        // -------------------------------------------------------------------------
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1dWE5xUykZHY7JDBvMDNAai2j8frFc-J7EgvgigRthc3oUVdxsRyxXn7sAkyXz2RIBQ/exec";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let unsubscribeLogs = null;
        let currentAudio = null;

        // DOM 요소 가져오기
        const authEmailInput = document.getElementById('auth-email');
        const authPasswordInput = document.getElementById('auth-password');
        const btnLogin = document.getElementById('btn-login');
        const btnSignup = document.getElementById('btn-signup');
        const btnLogout = document.getElementById('btn-logout');
        const loginFormContainer = document.getElementById('login-form-container');
        const loggedInContainer = document.getElementById('logged-in-container');
        const currentUserEmailText = document.getElementById('current-user-email');
        const logVessel = document.getElementById('log-vessel');
        const logRoute = document.getElementById('log-route');
        const logNote = document.getElementById('log-note');
        const btnSaveLog = document.getElementById('btn-save-log');
        const logList = document.getElementById('log-list');
        const aiInput = document.getElementById('ai-input');
        const btnSendAi = document.getElementById('btn-send-ai');
        const chatScreen = document.getElementById('chat-screen');
        const btnStopAudio = document.getElementById('btn-stop-audio');

        // 로그인 상태 확인 리스너
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginFormContainer.classList.add('hidden');
                loggedInContainer.classList.remove('hidden');
                btnLogout.classList.remove('hidden');
                currentUserEmailText.textContent = user.email;
                listenToVoyageLogs(user.uid);
            } else {
                currentUser = null;
                loginFormContainer.classList.remove('hidden');
                loggedInContainer.classList.add('hidden');
                btnLogout.classList.add('hidden');
                if (unsubscribeLogs) { unsubscribeLogs(); unsubscribeLogs = null; }
                logList.innerHTML = "로그인 후 조회 가능합니다.";
            }
        });

        // 회원가입 버튼
        btnSignup.addEventListener('click', async () => {
            try {
                await createUserWithEmailAndPassword(auth, authEmailInput.value.trim(), authPasswordInput.value.trim());
                alert('회원가입이 완료되었습니다!');
            } catch(e) { alert(e.message); }
        });

        // 로그인 버튼
        btnLogin.addEventListener('click', async () => {
            try {
                await signInWithEmailAndPassword(auth, authEmailInput.value.trim(), authPasswordInput.value.trim());
            } catch(e) { alert(e.message); }
        });

        // 로그아웃 버튼
        btnLogout.addEventListener('click', () => signOut(auth));

        // 항해 일지 저장
        btnSaveLog.addEventListener('click', async () => {
            if(!currentUser) return alert('로그인이 필요합니다.');
            try {
                await addDoc(collection(db, "voyage_logs"), {
                    userId: currentUser.uid,
                    vesselName: logVessel.value.trim(),
                    routePath: logRoute.value.trim(),
                    specialNote: logNote.value.trim(),
                    createdAt: Date.now()
                });
                logVessel.value = ''; logRoute.value = ''; logNote.value = '';
            } catch(e) { alert(e.message); }
        });

        // 일지 실시간 동기화 가져오기
        function listenToVoyageLogs(userId) {
            const q = query(collection(db, "voyage_logs"), where("userId", "==", userId), orderBy("createdAt", "desc"));
            unsubscribeLogs = onSnapshot(q, (snapshot) => {
                logList.innerHTML = '';
                if(snapshot.empty) return logList.innerHTML = "기록된 항해 일지가 없습니다.";
                snapshot.forEach((doc) => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = "bg-[#0b132b] p-3 rounded-lg border border-[#2c3d52] text-left space-y-1 mb-2";
                    div.innerHTML = `<div class='text-cyan-400 font-bold'>🚢 ${escapeHtml(d.vesselName)}</div><div class='text-gray-300'>📍 경로: ${escapeHtml(d.routePath)}</div><p class='text-gray-400 bg-[#151c33] p-2 rounded mt-1'>${escapeHtml(d.specialNote)}</p>`;
                    logList.appendChild(div);
                });
            });
        }

        // 앱스크립트 프록시 통신용 함수 (CORS 우회를 위해 text/plain 규격 사용)
        async function callAppsScriptProxy(type, payloadData) {
            if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("여기에_앱스크립트")) {
                return { error: "소스코드 상단에 APPS_SCRIPT_URL 주소를 먼저 입력해 주세요." };
            }
            
            const bodyPayload = { type: type, ...payloadData };

            const res = await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(bodyPayload)
            });
            return await res.json();
        }

        // AI 채팅 전송 핸들러
        async function handleChat() {
            const txt = aiInput.value.trim();
            if(!txt) return;
            appendMsg("user", txt);
            aiInput.value = '';
            
            const loadId = appendMsg("loading", "보안 채널을 통해 GPT 선장님의 무선 답변을 연산 중입니다...");
            try {
                const chatRes = await callAppsScriptProxy("chat", { question: txt });
                document.getElementById(loadId)?.remove();

                if(chatRes.error) {
                    appendMsg("ai", "서버 에러 발생: " + chatRes.error);
                    return;
                }

                appendMsg("ai", chatRes.answer);
            } catch(e) {
                document.getElementById(loadId)?.remove();
                appendMsg("ai", "네트워크 통신 오류가 발생했습니다: " + e.message);
            }
        }

        // OpenAI 정품 고품질 TTS 오디오 스트리밍 핸들러
        window.requestAndPlayTTS = async function(textToSpeak, btnElement) {
            if(currentAudio) { currentAudio.pause(); }
            
            const originalText = btnElement.innerHTML;
            btnElement.innerHTML = "<i class='fa-solid fa-spinner animate-spin'></i> 음성 변환 중...";
            btnElement.disabled = true;

            try {
                const ttsRes = await callAppsScriptProxy("tts", { text: textToSpeak });
                
                if(ttsRes.error) {
                    alert("TTS 생성 실패: " + ttsRes.error);
                } else if(ttsRes.audioBase64) {
                    const audioUrl = "data:audio/mp3;base64," + ttsRes.audioBase64;
                    currentAudio = new Audio(audioUrl);
                    currentAudio.play();
                }
            } catch(err) {
                alert("오디오 로딩 오류: " + err.message);
            } finally {
                btnElement.innerHTML = originalText;
                btnElement.disabled = false;
            }
        };

        btnSendAi.addEventListener('click', handleChat);
        aiInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });
        btnStopAudio.addEventListener('click', () => { if(currentAudio) currentAudio.pause(); });

        // 화면에 메시지 말풍선 출력 유틸 함수
        function appendMsg(sender, text) {
            const id = "msg-" + Date.now();
            const d = document.createElement('div');
            if(sender === "user") {
                d.className = "flex justify-end";
                d.innerHTML = `<div class="bg-cyan-600 p-3 rounded-xl rounded-tr-none text-sm max-w-[85%]">${escapeHtml(text)}</div>`;
            } else if(sender === "loading") {
                d.id = id; d.className = "text-xs text-gray-500 italic animate-pulse flex items-center gap-1"; 
                d.innerHTML = `<i class="fa-solid fa-spinner animate-spin text-cyan-400"></i> ${text}`;
            } else {
                d.className = "flex space-x-2";
                const cleanTextForAttribute = text.replace(/"/g, '&quot;').replace(/\n/g, ' ');
                d.innerHTML = `
                    <div class="bg-[#1c2541] p-4 rounded-xl rounded-tl-none text-sm border border-[#3a506b] w-full relative shadow">
                        <p>${escapeHtml(text).replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b class="text-cyan-300">$1</b>')}</p>
                        <div class="mt-3 text-[11px] flex justify-between text-gray-500 border-t border-gray-700 pt-2">
                            <span>SeaNav Captain GPT</span>
                            <button onclick="window.requestAndPlayTTS(this.getAttribute('data-text'), this)" data-text="${cleanTextForAttribute}" class="text-cyan-400 hover:underline cursor-pointer flex items-center gap-1 font-medium">
                                <i class="fa-solid fa-volume-high"></i> OpenAI Real TTS 브리핑 듣기
                            </button>
                        </div>
                    </div>`;
            }
            chatScreen.appendChild(d);
            chatScreen.scrollTop = chatScreen.scrollHeight;
            return id;
        }

        function escapeHtml(str) { return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }
    </script>
</body>
</html>
